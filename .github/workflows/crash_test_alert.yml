name: BYD Atto 2 Crash Test Alert

on:
  schedule:
    # Runs daily at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allow manual trigger from the Actions tab

permissions:
  contents: write   # needed to commit updated state.json back

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/atto2-crash-test-alert-5K1ET

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: monitor/requirements.txt

      - name: Install dependencies
        run: pip install -r monitor/requirements.txt

      - name: Run crash test monitor
        env:
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          SMTP_HOST:   ${{ secrets.SMTP_HOST }}
          SMTP_PORT:   ${{ secrets.SMTP_PORT }}
          SMTP_USER:   ${{ secrets.SMTP_USER }}
          SMTP_PASS:   ${{ secrets.SMTP_PASS }}
        run: python monitor/crash_test_monitor.py

      # Commit updated state.json so we don't re-send alerts on the next run
      - name: Commit state (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monitor/state.json
          if git diff --cached --quiet; then
            echo "No state change."
          else
            git commit -m "chore: update crash test monitor state"
            git push origin claude/atto2-crash-test-alert-5K1ET
          fi
