name: Deploy site

on:
  push:
    branches: [main, claude/trusting-turing-9rfmg2]
  schedule:
    # Re-sync from the Google Sheet and redeploy every Monday 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

# Pages is configured with source "Deploy from a branch: gh-pages", so this
# workflow builds the site and pushes it to that branch; GitHub then serves it.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Sync data from Google Sheet
        working-directory: frontend
        run: |
          npm run sync-data || echo "::warning::Sheet sync failed — building with last committed holdings.json"

      - name: Build static site
        working-directory: frontend
        env:
          NEXT_BASE_PATH: /fundbello
        run: |
          npm run build
          touch out/.nojekyll

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/out
